databaseChangeLog:
  - changeSet:
      id: 1775394050044-1
      author: Ughur
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: username
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: hashed_password
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: phone
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: DATETIME
            tableName: users
  - changeSet:
      id: 1775394050044-2
      author: Ughur
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addUniqueConstraint:
            columnNames: username
            constraintName: uc_users_username
            tableName: users

