databaseChangeLog:
  - changeSet:
      id: 1789895651121-1-create-payment-table
      author: Ughur
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_payment_history
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: payment_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: payment_status
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: amount
                  type: DECIMAL
              - column:
                  constraints:
                    nullable: false
                  name: currency
                  type: SMALLINT
              - column:
                  constraints:
                    nullable: false
                  name: created_at
                  type: DATETIME
            tableName: payment_history