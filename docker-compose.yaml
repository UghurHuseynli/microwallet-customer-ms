networks:
  ms-network:
    external: true
    name: ms-network

volumes:
  postgres-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres-customer
    restart: unless-stopped
    networks: [ ms-network ]
    environment:
      - POSTGRES_USER=${DOCKER_PSQLDB_NAME}
      - POSTGRES_PASSWORD=${DOCKER_PSQLDB_PASSWORD}
      - POSTGRES_DB=customer-ms
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d customer-ms" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  customer-service:
    build: .
    container_name: customer-service
    restart: unless-stopped
    networks: [ms-network]
    ports:
      - "8080:8080"
    depends_on:
#      - payment-service
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_SERVICE_URL: http://payment-service:8081